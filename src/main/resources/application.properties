spring.application.name=hotelautomation

# --- Database Configuration ---
# Uses Render environment variables, falls back to your local setup
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/abhi-db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:abhi8229867517}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate Configuration ---
# Specifically tells Hibernate to use PostgreSQL syntax
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# --- Connection Pooling ---
# Ensures connections are handled properly in a cloud environment
spring.datasource.hikari.auto-commit=false
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

# --- File Upload Settings ---
# Matching your project requirements for room images
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB