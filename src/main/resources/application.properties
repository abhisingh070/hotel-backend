spring.application.name=hotelautomation

# Fallback to local if DATABASE_URL isn't set
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/abhi-db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:abhi8229867517}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Optimization for PostgreSQL
spring.datasource.hikari.auto-commit=false

# File Upload settings (Great for those room images!)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB